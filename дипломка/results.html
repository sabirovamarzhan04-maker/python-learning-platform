<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нәтижелер</title>
<link rel="stylesheet" href="style.css" />
<script src="theme.js"></script>
</head>

<body>
<header>
  <h1>Python Learning</h1>
  <nav>
    <a href="/static/index.html">Басты бет</a>
    <a href="/static/materials.html">Дәрістер</a>
    <a href="/static/playground.html">Онлайн компилятор</a>
    <a href="/static/results.html" class="active">Нәтижелер</a>
  </nav>
</header>

<main>
  <h2>Оқу үлгерімі мен нәтижелер</h2>

  <div id="resultsContainer">
    <p class="no-results">Нәтижелер жүктелуде...</p>
  </div>
</main>

<script>
const API = "https://python-learning-platform-1.onrender.com";
const username = localStorage.getItem("username");
const email = localStorage.getItem("email");
const container = document.getElementById("resultsContainer");

if (!username || !email) {
  alert("Алдымен аккаунтқа кіріңіз!");
  window.location.href = "/static/index.html";
}

const topicNames = {
  "1.1.1": "Python тілінің анықтамасы",
  "1.1.2": "Сызықты және шартты алгоритмдер",
  "1.2.1": "Цикл операторы",
  "1.2.2": "Цикл операторы while",
  "1.2.3": "Цикл және функциялар",
  "1.3.1": "Тізімнің негізгі түсініктері",
  "1.3.2": "Бірөлшемді тізімдер",
  "2.1.1": "Массивтің құрылымы",
  "2.1.2": "Массивті сұрыптау",
  "2.2.1": "Екі өлшемді массивтер",
  "2.2.2": "NumPy массивтері",
  "2.3.1": "Рекурсия",
  "2.3.2": "Жолдар",
  "2.3.3": "Сөздіктер",
  "2.3.4": "Кортеждер"
};

const topicOrder = Object.keys(topicNames);

function percent(correct, total){
  if (!total || total === 0) return 0;
  return Math.round((correct / total) * 100);
}

function cleanTopic(topic){
  return String(topic || "").replace("_practice", "");
}

function progressRow(topic, value){
  return `
    <div class="progress-row">
      <div class="progress-title">
        <b>${topic}</b>
        <span>${topicNames[topic] || ""}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${value}%"></div>
      </div>
      <strong>${value}%</strong>
    </div>
  `;
}

async function loadResults(){
  try {
    const [resResults, resProgress] = await Promise.all([
      fetch(`${API}/results/?username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}`),
      fetch(`${API}/progress/?username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}`)
    ]);

    const data = await resResults.json();
    const progress = await resProgress.json();

    const overall = progress.overall || {};
    const topics = progress.topics || [];
    const results = data.results || [];

    let testMap = {};
    let practiceMap = {};

    topics.forEach(t => {
      const topic = cleanTopic(t.topic);
      const p = Math.round(t.avg_percent || 0);
      if (String(t.topic).includes("_practice")) {
        practiceMap[topic] = p;
      } else {
        testMap[topic] = p;
      }
    });

    let gradesHtml = "";

    if (topics.length > 0) {
      topics.forEach(t => {
        const topic = cleanTopic(t.topic);
        const isPractice = String(t.topic).includes("_practice");

        gradesHtml += `
          <tr>
            <td><b>${topic}</b><br><span>${topicNames[topic] || ""}</span></td>
            <td>${isPractice ? "Тапсырма" : "Мини-тест"}</td>
            <td>${t.correct || 0} / ${t.total || 0}</td>
            <td>${Math.round(t.avg_percent || 0)}%</td>
            <td>${t.teacher_grade ?? "—"}</td>
            <td>${t.teacher_comment || "—"}</td>
          </tr>
        `;
      });
    } else {
      gradesHtml = `<tr><td colspan="6">Әзірге баға жоқ</td></tr>`;
    }

    const testRows = topicOrder.map(t => progressRow(t, testMap[t] || 0)).join("");
    const practiceRows = topicOrder.map(t => progressRow(t, practiceMap[t] || 0)).join("");

    container.innerHTML = `
      <section class="card results-summary-card">
        <h3>Орташа көрсеткіштер</h3>
        <div class="summary-grid">
          <div>
            <span>Орташа балл</span>
            <b>${overall.avg_score ? overall.avg_score.toFixed(1) : "0"} / 10</b>
          </div>
          <div>
            <span>Тапсырмалар</span>
            <b>${overall.tasks_total || 0}</b>
          </div>
          <div>
            <span>Меңгеру деңгейі</span>
            <b class="success-text">${overall.avg_percent ? overall.avg_percent.toFixed(0) : "0"}%</b>
          </div>
        </div>
      </section>

      <section class="results-layout">
        <div class="card">
          <h3>🏆 Рейтинг</h3>
          <p class="muted">Бұл жерде кейін барлық оқушылардың рейтингі шығады.</p>
          <div class="rating-item">
            <span>1</span>
            <b>${username}</b>
            <em>${overall.avg_percent ? overall.avg_percent.toFixed(0) : "0"}%</em>
          </div>
        </div>

        <div class="card">
          <h3>📊 Тақырып бойынша меңгеру</h3>

          <div class="tabs">
            <button class="tab-btn active" onclick="showTab('test')">Тест</button>
            <button class="tab-btn" onclick="showTab('practice')">Тапсырма</button>
          </div>

          <div id="testTab" class="tab-content">${testRows}</div>
          <div id="practiceTab" class="tab-content" style="display:none;">${practiceRows}</div>
        </div>
      </section>

      <section class="card">
        <h3>Менің бағаларым</h3>
        <table>
          <thead>
            <tr>
              <th>Тақырып</th>
              <th>Түрі</th>
              <th>Дұрыс жауап</th>
              <th>Пайыз</th>
              <th>Мұғалім бағасы</th>
              <th>Пікір</th>
            </tr>
          </thead>
          <tbody>${gradesHtml}</tbody>
        </table>
      </section>
    `;

  } catch(err) {
    console.error(err);
    container.innerHTML = `<p class="no-results">⚠ Нәтижелерді жүктеу кезінде қате шықты.</p>`;
  }
}

function showTab(type){
  document.getElementById("testTab").style.display = type === "test" ? "block" : "none";
  document.getElementById("practiceTab").style.display = type === "practice" ? "block" : "none";

  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

loadResults();
</script>

</body>
</html>
