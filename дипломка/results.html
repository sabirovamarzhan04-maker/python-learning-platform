<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нәтижелер</title>
<link rel="stylesheet" href="style.css" />
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>Python Learning</h1>
  <nav>
    <a href="index.html">Басты бет</a>
    <a href="materials.html">Материалдар</a>
    <a href="practice.html">Тапсырмалар</a>
    <a href="playground.html">Песочница</a>
    <a href="results.html" class="active">Нәтижелер</a>
  </nav>
</header>

<main>
  <h2>Оқу үлгерімі мен нәтижелер</h2>
  
  <div id="dashboard" class="dashboard-grid" style="display:none;">
    <div class="chart-card">
      <h3>Оқу үлгерімі (Learning Curve)</h3>
      <div class="chart-container-inner">
        <canvas id="learningCurveChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Тақырыптарды меңгеру</h3>
      <div class="chart-container-inner">
        <canvas id="topicCompletionChart"></canvas>
      </div>
    </div>
  </div>

  <div id="resultsContainer">
    <p class="no-results">Нәтижелер жүктелуде...</p>
  </div>
</main>

<script>
const API = "http://127.0.0.1:8000";
const username = localStorage.getItem("username") || "student1";
const email = localStorage.getItem("email") || "student1@example.com";
const container = document.getElementById("resultsContainer");
const dashboard = document.getElementById("dashboard");

function extractScore(feedback) {
  if (!feedback) return 0;
  const match = feedback.match(/(\d+(?:\.\d+)?)/);
  if (match) {
    let s = parseFloat(match[1]);
    return s > 10 ? 10 : s;
  }
  return 0;
}

async function loadResults() {
  try {
    const [resResults, resProgress] = await Promise.all([
      fetch(`${API}/results/?username=${username}&email=${email}`),
      fetch(`${API}/progress/?username=${username}&email=${email}`)
    ]);

    const data = await resResults.json();
    const progress = await resProgress.json();

    if ((!data.results || data.results.length === 0) && (!progress.topics || progress.topics.length === 0)) {
      container.innerHTML = `<p class="no-results">Сізде әзірге нәтижелер жоқ 😔</p>`;
      return;
    }

    dashboard.style.display = "grid";

    const overall = progress.overall || {};
    const topics = progress.topics || [];
    
    // Render Charts
    renderCharts(data.results, topics);

    let html = `
      <div class="card" style="margin-bottom: 30px;">
        <h3 style="margin-top:0; color: var(--accent);">Орташа көрсеткіштер</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            <div>
                <div style="color: var(--text-muted); font-size: 14px;">Орташа балл</div>
                <div style="font-size: 24px; font-weight: 800; color: #fff;">${overall.avg_score ? overall.avg_score.toFixed(1) : '0'} / 10</div>
            </div>
            <div>
                <div style="color: var(--text-muted); font-size: 14px;">Тапсырмалар</div>
                <div style="font-size: 24px; font-weight: 800; color: #fff;">${overall.tasks_total || 0}</div>
            </div>
            <div>
                <div style="color: var(--text-muted); font-size: 14px;">Меңгеру деңгейі</div>
                <div style="font-size: 24px; font-weight: 800; color: var(--success);">${overall.avg_percent ? overall.avg_percent.toFixed(0) : '0'}%</div>
            </div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Тақырып</th>
            <th>Жауап (код)</th>
            <th>Пікір мен баға</th>
          </tr>
        </thead>
        <tbody>
    `;

    if (data.results && data.results.length > 0) {
        data.results.forEach(r => {
          html += `
            <tr>
              <td><span class="badge" style="background: var(--bg-input); border: 1px solid var(--border-color);">${r.topic}</span></td>
              <td><pre style="margin:0; padding: 10px;">${r.answer || "-"}</pre></td>
              <td class="feedback">${r.feedback || "—"}</td>
            </tr>
          `;
        });
    } else {
        html += `<tr><td colspan="3" style="text-align:center; padding: 20px; color: var(--text-muted);">Практикалық тапсырмалар әлі орындалмаған</td></tr>`;
    }

    html += "</tbody></table>";
    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = `<p class="no-results">⚠ Серверге қосылу кезінде қате орын алды.</p>`;
    console.error(err);
  }
}

function renderCharts(results, topics) {
    // 1. Learning Curve (Scores over time)
    const ctxLine = document.getElementById('learningCurveChart').getContext('2d');
    const labels = results.map((_, i) => `Тапсырма ${i + 1}`);
    const scores = results.map(r => extractScore(r.feedback));

    new Chart(ctxLine, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Баға (0-10)',
                data: scores,
                 borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.08)',
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#6366f1',
                pointHoverRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: 10, ticks: { color: '#64748b' }, grid: { color: 'rgba(0,0,0,0.05)' } },
                x: { ticks: { color: '#64748b' }, grid: { display: false } }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    // 2. Topic Completion (Topic-wise percents)
    const ctxPie = document.getElementById('topicCompletionChart').getContext('2d');
    const topicLabels = topics.map(t => t.topic);
    const topicPercents = topics.map(t => t.avg_percent || 0);

    new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: topicLabels,
            datasets: [{
                data: topicPercents,
                backgroundColor: [
                    '#8a2be2', '#ff007f', '#00f0ff', '#10b981', '#f59e0b', '#3b82f6'
                ],
                borderWidth: 0,
                hoverOffset: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'right',
                    labels: { color: '#64748b', padding: 20, font: { size: 12 } }
                }
            },
            cutout: '70%'
        }
    });
}

loadResults();
</script>

</body>
</html>
