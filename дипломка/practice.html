<!DOCTYPE html>
<html lang="kk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Практикалық тапсырмалар</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
</head>

<body>

  <header>
    <h1>Python Learning</h1>
    <nav>
      <a href="/static/index.html">Басты бет</a>
      <a href="/static/materials.html">Дәрістер</a>
      <a href="/static/playground.html">Онлайн компилятор</a>
      <a href="/static/results.html">Нәтижелер</a>
    </nav>
  </header>

  <main>
    <h2 id="topicTitle">Тақырып анықталмады</h2>
    <div id="tasks">Тапсырма жүктелуде...</div>

    <div id="answerSection" style="display:none;">
      <div id="answerArea"></div>
      <button id="sendBtn" onclick="checkAnswer()">Келесі ➜</button>
      <div id="feedback"></div>
    </div>
  </main>

  <footer>
    © 2026 Python Learning. Барлық құқықтар қорғалған.
  </footer>

  <script>
    const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? window.location.origin
      : "https://python-learning-platform-1.onrender.com";
    const params = new URLSearchParams(window.location.search);
    const topic = params.get("topic");
    const username = localStorage.getItem("username") || "student1";
    const email = localStorage.getItem("email") || "student1@example.com";

    const title = document.getElementById("topicTitle");
    const tasksDiv = document.getElementById("tasks");
    const answerSection = document.getElementById("answerSection");
    const answerArea = document.getElementById("answerArea");
    const feedbackDiv = document.getElementById("feedback");
    const sendBtn = document.getElementById("sendBtn");

    let questions = [];
    let currentTaskIndex = 0;
    let correctCount = 0;
    let userAnswers = {};

    if (topic) {
      title.textContent = "Тақырып: " + topic;
    } else {
      title.textContent = "Тақырып таңдалмады";
      tasksDiv.innerHTML = `
        <div class="practice-question-card">
          <p>Бұл бетте ИИ-тапсырмаларды орындау үшін алдымен <b>Материалдар</b> бетінен нақты бір тақырыпты таңдауыңыз керек.</p>
          <br>
          <button onclick="window.location.href='materials.html'">📚 Материалдар бетіне өту</button>
        </div>
      `;
      answerSection.style.display = "none";
    }

    // === Check if already completed ===
    async function checkIfCompleted() {
      try {
        const res = await fetch(`${API}/results/?username=${username}&email=${email}`);
        const data = await res.json();
        const alreadyDone = data.results?.find(r => r.topic === topic && r.completed);
        if (alreadyDone) {
          tasksDiv.innerHTML = `<div class="practice-question-card"><p>✅ Бұл тақырып бұрын орындалған.</p><p style="color: var(--text-muted); margin-top: 10px;">Жауап: ${alreadyDone.feedback}</p></div>`;
          answerSection.style.display = "none";
          return true;
        }
      } catch(e) {}
      return false;
    }

    // === Load tasks from AI ===
    async function loadTasks() {
      if (!topic) return;
      const done = await checkIfCompleted();
      if (done) return;

      tasksDiv.innerHTML = `<div class="practice-question-card"><p>ЖИ тапсырмаларды дайындап жатыр...</p></div>`;

      try {
        const res = await fetch(`${API}/generate_tasks/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, username, email })
        });
        const data = await res.json();

        if (data.questions && Array.isArray(data.questions) && data.questions.length > 0) {
          questions = data.questions;
          currentTaskIndex = 0;
          showCurrentTask();
        } else {
          tasksDiv.innerHTML = `<div class="practice-question-card"><p>⚠ Тапсырмаларды алу мүмкін болмады.</p></div>`;
        }
      } catch (e) {
        tasksDiv.innerHTML = `<div class="practice-question-card"><p>⚠ Серверге қосылу мүмкін болмады.</p></div>`;
      }
    }

    // === Render current task ===
    function showCurrentTask() {
      feedbackDiv.innerHTML = "";

      if (currentTaskIndex >= questions.length) {
        showSummary();
        return;
      }

      const q = questions[currentTaskIndex];
      const num = currentTaskIndex + 1;

      // Build question card
      let typeLabel = "Теория";
      if (q.type === "test") typeLabel = "Тест";
      else if (q.type === "code" || q.type === "code_fill") typeLabel = "Код";
      else if (q.type === "matching") typeLabel = "Сәйкестендіру";
      else if (q.type === "order_lines") typeLabel = "Ретін табу";
      else if (q.type === "find_error") typeLabel = "Қатені түзету";
      else if (q.type === "predict_output") typeLabel = "Нәтижені болжау";

      let cardHtml = `
        <div class="practice-question-card">
          <h3>${num}. ${q.question} <span class="badge">${typeLabel}</span></h3>
      `;

      // Build answer area
      answerSection.style.display = "block";
      sendBtn.disabled = false;
      sendBtn.textContent = currentTaskIndex < questions.length - 1 ? "Келесі ➜" : "Аяқтау ✓";

      if (q.type === "test" && Array.isArray(q.options)) {
        // Radio buttons for test questions
        let optionsHtml = '<div class="practice-options">';
        q.options.forEach((opt, idx) => {
          optionsHtml += `
            <label>
              <input type="radio" name="practiceAnswer" value="${idx + 1}">
              <span>${opt}</span>
            </label>
          `;
        });
        optionsHtml += '</div>';
        cardHtml += optionsHtml;
        answerArea.innerHTML = ''; // No extra input needed
      } else if ((q.type === "code" || q.type === "code_fill") && (q.template || q.code_template)) {
        // Code with template
        const template = q.template || q.code_template || "";
        cardHtml += `<div class="practice-code-template">${escapeHtml(template)}</div>`;
        if (q.expected_output) {
          cardHtml += `
            <div class="practice-expected-output">
              <b>Нәтиже:</b>
              <pre>${escapeHtml(q.expected_output)}</pre>
            </div>
         `;
      }
        answerArea.innerHTML = `
          <div class="form-field practice-input-answer">
            <label>Бос жерлерді толықтырыңыз (үтір арқылы):</label>
            <input type="text" id="codeAnswer" placeholder="Мысалы: range, 6">
          </div>
        `;
      } else if (q.type === "matching" && Array.isArray(q.left) && Array.isArray(q.right)) {
        let matchHtml = '<div class="practice-options">';
        q.left.forEach((leftText, idx) => {
          matchHtml += `
            <label>
              <span>${idx + 1}. ${escapeHtml(leftText)}</span>
              <select id="match_${idx}">
                <option value="">Жауап таңдаңыз</option>
                ${q.right.map((rightText, rightIdx) => `<option value="${rightIdx}">${escapeHtml(rightText)}</option>`).join("")}
              </select>
            </label>
          `;
        });
        matchHtml += '</div>';
        cardHtml += matchHtml;
        answerArea.innerHTML = '';
      } else if (q.type === "order_lines" && Array.isArray(q.lines)) {
        cardHtml += `
          <div class="practice-code-template">${q.lines.map((line, idx) => `${idx + 1}. ${escapeHtml(line)}`).join("<br>")}</div>
        `;
        if (q.expected_output) {
          cardHtml += `
            <div class="practice-expected-output">
              <b>Нәтиже:</b>
              <pre>${escapeHtml(q.expected_output)}</pre>
            </div>
          `;
        }
        answerArea.innerHTML = `
          <div class="form-field practice-input-answer">
            <label>Дұрыс ретін нөмірлермен жазыңыз:</label>
            <input type="text" id="orderAnswer" placeholder="Мысалы: 2, 1, 4, 3">
          </div>
        `;
      } else if ((q.type === "find_error" || q.type === "predict_output") && q.template) {
        cardHtml += `<div class="practice-code-template">${escapeHtml(q.template)}</div>`;
        if (q.expected_output && q.type === "find_error") {
          cardHtml += `
            <div class="practice-expected-output">
              <b>Күтілетін нәтиже:</b>
              <pre>${escapeHtml(q.expected_output)}</pre>
            </div>
          `;
        }
        answerArea.innerHTML = `
          <div class="form-field practice-input-answer">
            <label>${q.type === "predict_output" ? "Экранға шығатын нәтижені жазыңыз:" : "Қате жолдың дұрыс нұсқасын жазыңыз:"}</label>
            <textarea id="interactiveAnswer" rows="3" placeholder="Жауабыңызды осында жазыңыз..."></textarea>
          </div>
        `;
      } else if (q.type === "theory") {
        // Open-ended theory question
        answerArea.innerHTML = `
          <div class="form-field practice-input-answer">
            <label>Жауабыңыз:</label>
            <textarea id="theoryAnswer" rows="3" placeholder="Жауабыңызды осында жазыңыз..."></textarea>
          </div>
        `;
      } else {
        // Fallback - generic text input
        answerArea.innerHTML = `
          <div class="form-field practice-input-answer">
            <label>Жауабыңыз:</label>
            <textarea id="theoryAnswer" rows="3" placeholder="Жауабыңызды осында жазыңыз..."></textarea>
          </div>
        `;
      }

      cardHtml += '</div>';
      tasksDiv.innerHTML = cardHtml;
    }

    // === Check answer ===
    function checkAnswer() {
      const q = questions[currentTaskIndex];
      let userAnswer = "";
      let correct = null; // true, false, or null (open question)

      if (q.type === "test" && Array.isArray(q.options)) {
        const selected = document.querySelector("input[name='practiceAnswer']:checked");
        if (!selected) {
          feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Жауапты таңдаңыз!</div>';
          return;
        }
        const selectedNum = parseInt(selected.value, 10);
        userAnswer = q.options[selectedNum - 1];

        // GPT sometimes returns 0-based, sometimes 1-based index
        const correctIdx = q.correct;
        if (typeof correctIdx === "number") {
          // Try 1-based first (most common)
          if (selectedNum === correctIdx) {
            correct = true;
          }
          // Try 0-based if correct seems to be 0-based (index 0 picked and correct is 0)
          else if (correctIdx === 0 && selectedNum === 1) {
            correct = true;
          }
          // If correct index seems > options length, it's likely 0-based
          else if (correctIdx < q.options.length && selectedNum === correctIdx + 1 && correctIdx >= 0) {
            // This case handles when GPT gives 0-based: correct=0 means first option
            // Only apply if our 1-based didn't match above
            // Let's try: if correctIdx is 0, first option; else 1-based
          }
          else {
            correct = false;
          }
        } else if (typeof correctIdx === "string") {
          // GPT returned correct answer as text
          correct = userAnswer.trim().toLowerCase() === correctIdx.trim().toLowerCase();
        }

      } else if ((q.type === "code" || q.type === "code_fill")) {
        const codeInput = document.getElementById("codeAnswer");
        if (!codeInput || !codeInput.value.trim()) {
          feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Жауапты жазыңыз!</div>';
          return;
        }
        userAnswer = codeInput.value.trim();
        
        // Get correct answers array
        const correctArr = q.answer || q.correct;
        if (Array.isArray(correctArr)) {
          const userParts = userAnswer.split(",").map(s => s.trim()).filter(Boolean);
          if (userParts.length === correctArr.length) {
            correct = correctArr.every((val, idx) => 
              userParts[idx]?.toLowerCase() === String(val).toLowerCase()
            );
          } else {
            correct = false;
          }
        } else if (typeof correctArr === "string") {
          correct = userAnswer.toLowerCase() === correctArr.toLowerCase();
        } else {
          correct = null; // can't check, mark as open
        }

      } else if (q.type === "matching") {
        const selectedIndexes = [];
        for (let i = 0; i < (q.left || []).length; i++) {
          const select = document.getElementById(`match_${i}`);
          if (!select || select.value === "") {
            feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Барлық жұпты таңдаңыз!</div>';
            return;
          }
          selectedIndexes.push(parseInt(select.value, 10));
        }
        userAnswer = selectedIndexes.map(i => q.right[i]).join(" | ");
        correct = Array.isArray(q.answer)
          && q.answer.length === selectedIndexes.length
          && q.answer.every((rightIdx, idx) => Number(rightIdx) === selectedIndexes[idx]);

      } else if (q.type === "order_lines") {
        const orderInput = document.getElementById("orderAnswer");
        if (!orderInput || !orderInput.value.trim()) {
          feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Ретін жазыңыз!</div>';
          return;
        }
        const userOrder = orderInput.value
          .split(/[,\s]+/)
          .map(v => parseInt(v, 10))
          .filter(v => !Number.isNaN(v))
          .map(v => v - 1);
        userAnswer = userOrder.map(v => v + 1).join(", ");
        correct = Array.isArray(q.answer)
          && q.answer.length === userOrder.length
          && q.answer.every((lineIdx, idx) => Number(lineIdx) === userOrder[idx]);

      } else if (q.type === "find_error" || q.type === "predict_output") {
        const interactiveInput = document.getElementById("interactiveAnswer");
        if (!interactiveInput || !interactiveInput.value.trim()) {
          feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Жауапты жазыңыз!</div>';
          return;
        }
        userAnswer = interactiveInput.value.trim();
        const correctArr = q.answer || q.correct || [];
        if (Array.isArray(correctArr)) {
          correct = correctArr.some(ans => normalizeAnswer(userAnswer) === normalizeAnswer(String(ans)));
        } else if (typeof correctArr === "string") {
          correct = normalizeAnswer(userAnswer) === normalizeAnswer(correctArr);
        } else {
          correct = null;
        }

      } else {
        // Theory / open question
        const theoryInput = document.getElementById("theoryAnswer");
        if (!theoryInput || !theoryInput.value.trim()) {
          feedbackDiv.innerHTML = '<div class="practice-feedback wrong">⚠ Жауапты жазыңыз!</div>';
          return;
        }
        userAnswer = theoryInput.value.trim();
        correct = null; // Not auto-graded
      }

      // Store answer
      userAnswers[currentTaskIndex] = userAnswer;

  // Show feedback
  if (correct === true) {

    let explanation = q.explanation
      ? `<br><b>Түсіндірме:</b> ${q.explanation}`
      : "";

    feedbackDiv.innerHTML =
      `<div class="practice-feedback correct">
        ✅ Дұрыс жауап!
        ${explanation}
      </div>`;

    correctCount++;

  } else if (correct === false) {

    let hint = '';
    let correctText = '';

    if (q.type === "test" && Array.isArray(q.options) && typeof q.correct === "number") {

      const ci = q.correct;
      correctText = q.options[ci - 1] || q.options[ci] || '';

      if (correctText) {
        hint = ` Дұрыс жауап: ${correctText}`;
      }

    } else if ((q.type === "code" || q.type === "code_fill") && (q.answer || q.correct)) {

      const arr = q.answer || q.correct;

      correctText = Array.isArray(arr)
        ? arr.join(", ")
        : arr;

      hint = ` Дұрыс жауап: ${correctText}`;
    }

    let explanation = q.explanation
      ? `<br><b>Түсіндірме:</b> ${q.explanation}`
      : "";

    feedbackDiv.innerHTML =
      `<div class="practice-feedback wrong">
        ❌ Дұрыс емес.${hint}
        ${explanation}
      </div>`;

  } else {

    feedbackDiv.innerHTML =
      '<div class="practice-feedback neutral">📝 Жауап сақталды. Мұғалім тексереді.</div>';
  }

      // Disable button to prevent double-click, advance after delay
      sendBtn.disabled = true;
      currentTaskIndex++;
      setTimeout(showCurrentTask, 1800);
    }

    // === Show summary ===
    function showSummary() {
      answerSection.style.display = "none";

      const autoTypes = ["test", "code", "code_fill", "matching", "order_lines", "find_error", "predict_output"];
      const autoCount = questions.filter(q => autoTypes.includes(q.type)).length;
      
      let html = `
        <div class="practice-summary">
          <h2>🎉 Барлық тапсырмалар орындалды!</h2>
          <p style="font-size: 16px; color: var(--text-muted);">
            Автоматты тексерілген сұрақтар: <strong style="color: var(--accent);">${correctCount} / ${autoCount}</strong>.
          </p>
          <h3 style="margin-top: 18px;">Дұрыс жауаптар</h3>
      `;

      questions.forEach((q, idx) => {
        let uAns = userAnswers[idx] || "Жауап берілмеді";
        let corrText = "";

        if (q.type === "test" && Array.isArray(q.options)) {
          const ci = q.correct;
          corrText = q.options[ci - 1] || q.options[ci] || String(ci);
        } else if (q.type === "code" || q.type === "code_fill" || q.type === "find_error" || q.type === "predict_output") {
          const ansArray = q.answer || q.correct;
          corrText = Array.isArray(ansArray) ? ansArray.join(", ") : String(ansArray || "");
        } else if (q.type === "matching" && Array.isArray(q.answer) && Array.isArray(q.right)) {
          corrText = q.answer.map(idx => q.right[idx]).join(" | ");
        } else if (q.type === "order_lines" && Array.isArray(q.answer)) {
          corrText = q.answer.map(idx => Number(idx) + 1).join(", ");
        }

        html += `<div class="practice-summary-item">
          <strong>${idx + 1}. ${q.question}</strong>
          <div class="user-answer">Сіздің жауабыңыз: ${escapeHtml(String(uAns))}</div>`;
        
        if (autoTypes.includes(q.type)) {
          html += `<div class="correct-answer">✓ Дұрыс жауап: ${escapeHtml(corrText)}</div>`;
          if (q.explanation) {
            html += `<div class="practice-explanation"><b>Түсіндірме:</b> ${escapeHtml(q.explanation)}</div>`;
          }
        } else {
          html += `<div class="open-answer">📝 Ашық сұрақ (мұғалім тексереді)</div>`;
        }
        html += '</div>';
      });

      html += `
        <div style="margin-top: 20px;">
          <button onclick="window.location.href='materials.html'">📚 Материалдарға қайту</button>
        </div>
        </div>
      `;

      tasksDiv.innerHTML = html;

      // Save results
      if (questions.length > 0) {
        saveQuizSummary().catch(() => {});
      }
    }

    async function saveQuizSummary() {
      const answersArray = questions.map((q, idx) => ({
        question: q.question,
        answer: userAnswers[idx] || "Жауап жоқ",
        correct: q.correct || q.answer || "N/A",
        type: q.type
      }));

      try {
        await fetch(`${API}/quiz_result/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username,
            email,
            topic: topic + "_practice",
            correct: correctCount,
            total: questions.length,
            answers: JSON.stringify(answersArray)
          })
        });
        localStorage.setItem("completed_" + topic, "true");
      } catch (e) {
        // Silently ignore
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function normalizeAnswer(text) {
      return String(text || "")
        .trim()
        .replace(/\r\n/g, "\n")
        .replace(/[ \t]+/g, " ")
        .toLowerCase();
    }

    loadTasks();
  </script>

</body>

</html>
